[supervisord]
nodaemon=true

[program:cupsd]
command=/usr/sbin/cupsd -f
priority=1
autostart=true
autorestart=true

[program:cupsctl]
command=bash -c "sleep 10 && /usr/sbin/cupsctl --remote-any ServerAlias=* DefaultEncryption=Never"
priority=2
autostart=true
autorestart=false
startsecs=0

[program:add-printer]
command=bash -c "sleep 12; lpadmin -p Kyocera -E -v ipp://192.168.0.25/ipp -m everywhere; cupsenable Kyocera; cupsaccept Kyocera; lpadmin -d Kyocera; echo 'Kyocera printer added.'"
priority=3
autostart=true
autorestart=false
startsecs=0
user=root

[program:savapage]
command=bash -c "\
  sleep 8; \
  mkdir -p /opt/savapage/server/data/internal/safepages; \
  mkdir -p /opt/savapage/server/custom/cups; \
  rm -f /opt/savapage/server/logs/service.pid; \
  echo 'Waiting for PostgreSQL...'; \
  until bash -c 'echo > /dev/tcp/savapage-postgres/5432' 2>/dev/null; do sleep 2; done; \
  echo 'PostgreSQL reachable.'; \
  if ! /opt/savapage/server/bin/linux-x64/savapage-db --db-schema-version >/dev/null 2>&1; then \
    echo 'No schema found - initializing database...'; \
    /opt/savapage/server/bin/linux-x64/savapage-db --db-init; \
  else \
    echo 'Schema present - skipping init.'; \
  fi; \
  /opt/savapage/server/bin/linux-x64/app-server start; \
  while pgrep -f org.savapage.server.WebServer >/dev/null; do sleep 10; done; \
  echo 'savapage WebServer exited'; exit 1"
priority=4
autostart=true
autorestart=true
startsecs=30
user=savapage

[program:savapage-cups-notifier]
command=bash -c "sleep 15 && /opt/savapage/providers/cups/linux-x64/roottasks"
priority=5
autostart=true
autorestart=false
startsecs=0
user=root
